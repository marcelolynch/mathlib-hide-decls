# policy.toml â€” single source of truth for "what makes a decl mech-safe
# to privatize". The pipeline consumes this file via
# `pipeline/src/policy.py`; the rest of the pipeline (`rerank.py`,
# `bulk_apply.py`, `build_dashboard.py`, `scripts/iterate_bundle.sh`)
# reads the parsed values through that loader and never embeds the
# blocklists itself. The Lean census
# (`scripts/decl_census/DeclCensus.lean`) is the layer below: it emits
# raw structural signals (kind, attributes, `name_pattern`,
# `n_external_users`, â€¦) and this file is the policy that combines them.

# ---------------------------------------------------------------------------
# Hard blocks â€” every consumer refuses these decls.
# ---------------------------------------------------------------------------

[hard_blocks]

# Kinds whose visibility is not directly controllable by `private` on the
# decl. `structure`/`class`/`inductive` would privatize their constructors
# and accessors implicitly; `ctor`/`rec`/`quot` are auto-synthesized and
# inherit visibility from the parent type.
never_hide_kinds = ["structure", "inductive", "class", "ctor", "rec", "quot"]

# Attributes whose presence makes `private` semantically wrong even when
# the build accepts it. Each carries a contract with cross-module callers
# (transparent unfolding, inlining, an active deprecation window) that
# depends on the decl remaining public. The census emits these as the
# `forbidden_attrs` field per decl. To extend the set, add the attribute
# name here *and* extend the detection in `getForbiddenAttrs` in
# `DeclCensus.lean`.
forbidden_attrs = [
  "reducible",            # downstream callers are expected to unfold transparently
  "implicit_reducible",   # stricter form of reducible
  "inline",               # compile-time hint for cross-module callers
  "deprecated",           # an active migration window for external users
]

# Attributes whose Lean elaborator rejects `private` outright (e.g.
# `private @[simp]`, `private @[ext]`). The apply-private pre-filter
# (`bulk_apply.py`, `scripts/iterate_bundle.sh`) skips any decl that
# carries one of these before invoking `lake build`.
build_rejected_attrs = [
  "simp", "ext", "norm_cast", "gcongr", "mono", "positivity",
  "norm_num", "fun_prop", "instance", "coe", "simps", "simps!",
]

# `name_pattern` values from the census that the policy refuses:
#  - `simps_projection`: a decl under a `Foo.Simps.*` namespace. These are
#    consumed by name in `@[simps]`-derived simp lemmas across arbitrary
#    downstream modules. The name-based uses are invisible to the
#    `Expr.foldConsts` reference graph, so structural signals do not
#    reflect the true user set.
forbidden_name_patterns = ["simps_projection"]

# Module-path prefixes excluded from the tier-1 candidate set. These
# subtrees are dominated by elaborator helpers and meta-programs that
# register themselves into extension state by name; their effective
# visibility is governed by mechanisms the structural signals do not see.
forbidden_module_prefixes = [
  "Mathlib.Tactic.",
  "Mathlib.Meta.",
  "Mathlib.Lean.",
]

# Suffix and substring patterns that identify auto-synthesized decls.
# Their visibility is inherited from the parent declaration, so the
# pipeline treats them as not directly privatizable.
auto_synth_suffixes = [
  ".ctorIdx", ".recOn", ".casesOn", ".brecOn", ".below", ".rec",
  ".noConfusion", ".noConfusionType",
  ".sizeOf", "._sizeOf_inst",
  ".mk.injEq", ".mk.sizeOf_spec", ".elim",
]
auto_synth_inner = [
  ".mk.noConfusion", ".match_", ".proof_",
  "._eq_", "._proof_", "._unsafe_rec",
]

# ---------------------------------------------------------------------------
# Tier definitions
# ---------------------------------------------------------------------------

[tier_1]
# Intent gate for single-decl privatization. A decl is intent-safe if its
# kind is in `intent_safe_kinds`, OR it is a theorem/lemma whose
# `name_pattern` is in `intent_safe_theorem_patterns` and which carries no
# docstring. The structural component of the tier-1 rule
# (`n_signature_refs == 0`, no external users) lives in `rerank.py`.
intent_safe_kinds = ["def", "abbrev"]
intent_safe_theorem_patterns = ["underscore_prefix", "aux", "internal_namespace"]
