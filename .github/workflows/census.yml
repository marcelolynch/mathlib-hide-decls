name: census

# Manually triggered census refresh.
#
# Pulls mathlib4 at the chosen ref, builds the Lean census, regenerates
# the ranked candidates and dashboard, and opens a PR with the diff.
# This is expected to take roughly 45-90 minutes on GitHub-hosted runners
# (single-threaded, CPU-bound on Expr.foldConsts).

on:
  workflow_dispatch:
    inputs:
      mathlib_ref:
        description: "mathlib4 git ref (branch, tag, or commit SHA)"
        required: true
        default: "master"
      skip_apply:
        description: "Skip the rerank + dashboard regen (just produce census.jsonl.gz)"
        required: false
        type: boolean
        default: false

jobs:
  census:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install elan + Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -sSf | sh -s -- -y --default-toolchain $(cat census/lean-toolchain)
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Clone mathlib4 at chosen ref
        run: |
          git clone --depth 100 https://github.com/leanprover-community/mathlib4 \
            $HOME/mathlib4
          cd $HOME/mathlib4
          git checkout ${{ inputs.mathlib_ref }}
          REV=$(git rev-parse HEAD)
          echo "mathlib4 at $REV ($(git log -1 --format=%s))"
          echo "MATHLIB_REV=$REV" >> $GITHUB_ENV

      - name: Cache lake build artefacts
        uses: actions/cache@v4
        with:
          path: |
            census/.lake/build
            ~/mathlib4/.lake/build
          key: lake-${{ env.MATHLIB_REV }}-${{ hashFiles('census/lakefile.lean') }}

      - name: Update census's mathlib pin
        run: |
          cd census
          # Point lakefile at the chosen ref. lakefile.lean carries the URL
          # but the ref is taken from this sed line.
          sed -i "s|@ \"master\"|@ \"${{ inputs.mathlib_ref }}\"|" lakefile.lean
          lake update

      - name: Build census
        run: |
          cd census
          lake build

      - name: Run census
        run: |
          cd census
          mkdir -p ../data/snapshots
          DATE=$(date +%Y-%m-%d)
          lake env .lake/build/bin/census | gzip > "../data/snapshots/census_${DATE}.jsonl.gz"
          cp "../data/snapshots/census_${DATE}.jsonl.gz" ../data/census_lean.jsonl.gz
          ls -lh ../data/census_lean.jsonl.gz

      - name: Refresh downstream artefacts
        if: ${{ !inputs.skip_apply }}
        env:
          MATHLIB_DIR: /home/runner/mathlib4
        run: |
          SKIP_CENSUS=1 SKIP_IMPACT=1 bash pipeline/scripts/snapshot.sh

      - name: Run impact estimate (needs mathlib git history)
        if: ${{ !inputs.skip_apply }}
        env:
          MATHLIB_DIR: /home/runner/mathlib4
        run: |
          # Need full history for the 1500-commit walk; the shallow clone
          # above is only 100 commits. Re-fetch for the walk.
          cd $HOME/mathlib4
          git fetch --unshallow || true
          cd $GITHUB_WORKSPACE
          python3 pipeline/src/estimate_impact.py
          DATE=$(date +%Y-%m-%d)
          cp data/estimated_impact.json "data/snapshots/impact_${DATE}.json"

      - name: Regenerate dashboard
        if: ${{ !inputs.skip_apply }}
        run: python3 pipeline/src/build_dashboard.py

      - name: Open PR with refreshed snapshot
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: refresh census against ${{ inputs.mathlib_ref }}"
          title: "Refresh census against mathlib ${{ inputs.mathlib_ref }}"
          body: |
            Census refresh triggered by `${{ github.actor }}`.

            - mathlib ref: `${{ inputs.mathlib_ref }}`
            - mathlib SHA: `${{ env.MATHLIB_REV }}`
            - skip_apply: `${{ inputs.skip_apply }}`

            Generated by `.github/workflows/census.yml`.
          branch: census-refresh-${{ env.MATHLIB_REV }}
          add-paths: |
            data/census_lean.jsonl.gz
            data/ranked_candidates.jsonl.gz
            data/estimated_impact.json
            data/dashboard_state.json
            data/snapshots/*
            site/index.html
